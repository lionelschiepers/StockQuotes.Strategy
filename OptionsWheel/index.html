<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options Wheel Candidate Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" charset="utf8" src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.js"></script>
    <style>
        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: #3b82f6 !important;
            color: white !important;
            border: 1px solid #3b82f6 !important;
        }
        table.dataTable thead th {
            border-bottom: 2px solid #e5e7eb !important;
        }
        table.dataTable border-collapse: collapse;
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8">
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">Options Wheel Candidate Dashboard</h1>
            <p id="last-updated" class="text-gray-500 mt-2">Loading data...</p>
        </header>
        
        <!-- Summary Cards -->
        <div id="summary" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 animate-pulse h-24"></div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 animate-pulse h-24"></div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 animate-pulse h-24"></div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 animate-pulse h-24"></div>
        </div>

        <!-- Main Table -->
        <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100 overflow-hidden">
            <table id="resultsTable" class="display w-full text-sm">
                <thead>
                    <tr class="text-left bg-gray-50">
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Ticker symbol for the stock.">Symbol</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Company name.">Name</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Whether the candidate passed all screening criteria.">Status</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Current underlying stock price.">Price</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Put option strike price evaluated for the wheel.">Strike</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Option expiration date.">Exp</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Days to expiration.">DTE</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Estimated premium collected per share.">Premium</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Estimated monthly yield percentage from premium.">Mo Yield%</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Out-of-the-money percentage from current price to strike.">OTM%</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Option delta, indicating probability-like sensitivity to price moves.">Delta</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Bid-ask spread as a percentage of option price (lower is better).">Spread%</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Open interest (number of open option contracts).">OI</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Composite ranking score: yield + OTM distance + liquidity (OI/volume) + spread quality + DTE fit + IV. Higher is better.">Score</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-200">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
        
        <footer class="mt-8 text-center text-gray-400 text-xs">
            Generated by OptionsWheel Strategy Analyzer
        </footer>
    </div>

    <script>
        $(document).ready(function() {
            Promise.all([
                fetch('analysis_results.json'),
                fetch('screening_config.json')
            ])
                .then(([resultsResponse, configResponse]) => {
                    if (!resultsResponse.ok) throw new Error('Could not load analysis_results.json');
                    if (!configResponse.ok) throw new Error('Could not load screening_config.json');
                    return Promise.all([resultsResponse.json(), configResponse.json()]);
                })
                .then(([data, config]) => {
                    const targetMonthlyYield = Number(config.TARGET_MONTHLY_YIELD_PCT ?? 1.0);
                    const minAbsDelta = Number(config.MIN_ABS_DELTA ?? 0.0);
                    const maxAbsDelta = Number(config.MAX_ABS_DELTA ?? 0.3);
                    const minOtmPct = Number(config.MIN_OTM_PCT ?? 0.0);
                    const maxSpreadPct = Number(config.MAX_SPREAD_PCT ?? 20.0);

                    // Update Last Updated
                    const date = new Date(data.timestamp);
                    document.getElementById('last-updated').innerText = `Last analyzed: ${date.toLocaleString()}`;

                    // Update Summary
                    const summaryDiv = document.getElementById('summary');
                    const cards = [
                        { label: 'Analyzed', value: data.total_tickers_analyzed, color: 'blue' },
                        { label: 'Phase 1 Passed', value: data.candidates_after_phase1, color: 'indigo' },
                        { label: 'Passed All', value: data.passed_all_criteria, color: 'green' },
                        { label: 'Near Misses', value: data.near_misses, color: 'amber' }
                    ];
                    
                    summaryDiv.innerHTML = cards.map(card => `
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                            <p class="text-gray-400 text-xs font-bold uppercase tracking-wider">${card.label}</p>
                            <p class="text-3xl font-black text-gray-800 mt-1">${card.value.toLocaleString()}</p>
                            <div class="h-1 w-12 bg-${card.color}-500 mt-3 rounded-full"></div>
                        </div>
                    `).join('');

                    // Populate Table
                    const tableBody = document.getElementById('tableBody');
                    tableBody.innerHTML = data.results.map(r => {
                        const monthlyYield = r.MonthlyYieldPct;
                        const spreadPct = r.SpreadPct;
                        const score = r.Score;
                        const absDelta = r.Delta != null ? Math.abs(r.Delta) : null;

                        const yieldClass = monthlyYield == null
                            ? 'text-gray-500'
                            : monthlyYield >= targetMonthlyYield
                                ? 'text-emerald-600'
                                : monthlyYield >= (targetMonthlyYield * 0.8)
                                    ? 'text-amber-600'
                                    : 'text-red-600';

                        const spreadClass = spreadPct == null
                            ? 'text-gray-500'
                            : spreadPct <= maxSpreadPct
                                ? 'text-emerald-600'
                                : spreadPct <= (maxSpreadPct * 1.25)
                                    ? 'text-amber-600'
                                    : 'text-red-600';

                        const otmClass = r.OTMPct == null
                            ? 'text-gray-500'
                            : r.OTMPct >= minOtmPct
                                ? 'text-emerald-600'
                                : r.OTMPct >= (minOtmPct * 0.8)
                                    ? 'text-amber-600'
                                    : 'text-red-600';

                        const deltaClass = absDelta == null
                            ? 'text-gray-500'
                            : (absDelta >= minAbsDelta && absDelta <= maxAbsDelta)
                                ? 'text-emerald-600'
                                : (absDelta >= (minAbsDelta * 0.8) && absDelta <= (maxAbsDelta * 1.2))
                                    ? 'text-amber-600'
                                    : 'text-red-600';

                        const scoreClass = score == null
                            ? 'text-gray-500'
                            : score >= 75
                                ? 'text-emerald-700'
                                : score >= 55
                                    ? 'text-amber-700'
                                    : 'text-red-700';

                        return `
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="px-4 py-4 font-bold text-blue-600"><a href="https://finance.yahoo.com/quote/${r.Symbol}/" target="_blank" class="hover:underline">${r.Symbol}</a></td>
                                <td class="px-4 py-4 text-gray-600 max-w-xs truncate" title="${r.Name}">${r.Name}</td>
                                <td class="px-4 py-4">
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${r.Status === 'PASS' ? 'bg-green-100 text-green-800' : 'bg-amber-100 text-amber-800'}">
                                        ${r.Status}
                                    </span>
                                </td>
                                <td class="px-4 py-4 font-mono text-gray-700 font-medium">${r.Price != null ? r.Price.toFixed(2) : 'N/A'}</td>
                                <td class="px-4 py-4 font-mono text-gray-700">${r.Strike != null ? r.Strike.toFixed(2) : 'N/A'}</td>
                                <td class="px-4 py-4 text-gray-600">${r.Expiration || 'N/A'}</td>
                                <td class="px-4 py-4 text-gray-600">${r.DTE != null ? r.DTE : 'N/A'}</td>
                                <td class="px-4 py-4 font-mono text-gray-700">${r.Premium != null ? r.Premium.toFixed(2) : 'N/A'}</td>
                                <td class="px-4 py-4 font-mono font-bold ${yieldClass}">${r.MonthlyYieldPct != null ? r.MonthlyYieldPct.toFixed(2) + '%' : 'N/A'}</td>
                                <td class="px-4 py-4 font-mono ${otmClass}">${r.OTMPct != null ? r.OTMPct.toFixed(2) + '%' : 'N/A'}</td>
                                <td class="px-4 py-4 font-mono ${deltaClass}">${r.Delta != null ? r.Delta.toFixed(3) : 'N/A'}</td>
                                <td class="px-4 py-4 font-mono ${spreadClass}">${r.SpreadPct != null ? r.SpreadPct.toFixed(2) + '%' : 'N/A'}</td>
                                <td class="px-4 py-4 text-gray-600">${r.OpenInterest != null ? r.OpenInterest : 'N/A'}</td>
                                <td class="px-4 py-4 font-mono font-semibold ${scoreClass}">${r.Score != null ? r.Score.toFixed(2) : 'N/A'}</td>
                            </tr>
                        `;
                    }).join('');

                    // Initialize DataTable
                    const table = $('#resultsTable').DataTable({
                        pageLength: 25,
                        order: [[2, 'asc'], [13, 'desc'], [8, 'desc']],
                        responsive: true,
                        language: {
                            searchPlaceholder: "Search tickers...",
                            search: ""
                        }
                    });
                    
                    // Style the search box
                    $('.dataTables_filter input').addClass('bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4');

                })
                .catch(error => {
                    console.error('Error loading JSON:', error);
                    document.getElementById('summary').innerHTML = `
                        <div class="col-span-full bg-red-50 p-4 border border-red-200 rounded-lg text-red-700">
                            <strong>Error:</strong> Could not load dashboard data.
                            <p class="text-sm mt-1">Please ensure <code>analysis_results.json</code> and <code>screening_config.json</code> exist and you are viewing this page through a web server (e.g., <code>python -m http.server</code>).</p>
                        </div>
                    `;
                });
        });
    </script>
</body>
</html>
