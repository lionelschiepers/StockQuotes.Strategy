<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options Wheel Candidate Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" charset="utf8" src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.js"></script>
    <style>
        :root {
            --bg-page: #eef3f9;
            --bg-surface: #ffffff;
            --bg-muted: #f4f7fb;
            --line-soft: #dbe4f0;
            --line-strong: #c5d1e0;
            --text-main: #0f1d33;
            --text-muted: #5f6f84;
            --accent: #2f6fed;
            --accent-weak: #e8f0ff;
            --symbol-col-width: 120px;
            --name-col-width: 220px;
        }

        body {
            font-family: 'Manrope', sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 0% 0%, #dbe8ff 0%, transparent 40%),
                radial-gradient(circle at 100% 0%, #dff7f0 0%, transparent 36%),
                var(--bg-page);
        }

        .font-mono {
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: -0.02em;
        }

        .dashboard-shell {
            background: color-mix(in srgb, var(--bg-surface) 92%, #f7faff);
            border: 1px solid var(--line-soft);
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(19, 39, 74, 0.08);
            padding: 1rem;
        }

        @media (min-width: 768px) {
            .dashboard-shell {
                padding: 1.25rem;
            }
        }

        #summary > div {
            background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            border: 1px solid var(--line-soft);
        }

        #tableToolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 0.65rem;
            padding: 0.5rem 0.1rem;
            border-top: 1px solid var(--line-soft);
            border-bottom: 1px solid var(--line-soft);
        }

        #tableToolbar .dataTables_length,
        #tableToolbar .dataTables_filter {
            float: none !important;
            margin: 0;
            padding: 0;
        }

        #tableToolbar .dataTables_filter {
            margin-left: auto;
            text-align: right;
        }

        .dataTables_wrapper .dataTables_length label,
        .dataTables_wrapper .dataTables_filter label,
        .dataTables_wrapper .dataTables_info {
            color: var(--text-muted) !important;
            font-size: 0.81rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .dataTables_wrapper .dataTables_filter input,
        .dataTables_wrapper .dataTables_length select {
            border: 1px solid var(--line-strong) !important;
            background: #ffffff !important;
            border-radius: 10px;
            height: 2.15rem;
            font-size: 0.86rem;
            color: var(--text-main);
            margin-left: 0.45rem;
            padding: 0 0.7rem;
            box-shadow: 0 1px 2px rgba(10, 30, 70, 0.04);
        }

        .dataTables_wrapper .dataTables_length select {
            min-width: 4.1rem;
            cursor: pointer;
        }

        .dataTables_wrapper .dataTables_filter input:focus,
        .dataTables_wrapper .dataTables_length select:focus {
            outline: none;
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(47, 111, 237, 0.18);
        }

        table.dataTable {
            border-collapse: separate !important;
            border-spacing: 0;
            margin-top: 0 !important;
            width: 100% !important;
        }

        table.dataTable thead th {
            border-bottom: 1px solid var(--line-strong) !important;
            border-top: 1px solid var(--line-soft);
            background: linear-gradient(180deg, #fbfdff 0%, #f0f5fc 100%) !important;
            color: #1f314f !important;
            font-size: 0.74rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-weight: 800 !important;
            padding: 0.64rem 0.72rem !important;
            white-space: nowrap;
        }

        #resultsTable tbody td {
            border-bottom: 1px solid var(--line-soft);
            padding: 0.52rem 0.72rem !important;
            line-height: 1.25;
            white-space: nowrap;
            font-size: 0.82rem;
        }

        #resultsTable tbody tr {
            background: #ffffff;
            transition: background-color 0.15s ease;
        }

        #resultsTable tbody tr:nth-child(even) {
            background: var(--bg-muted);
        }

        #resultsTable tbody tr:hover {
            background: #eaf2ff !important;
        }

        #resultsTable {
            --symbol-col-width: 120px;
        }

        #resultsTable thead th {
            position: sticky;
            top: 0;
            z-index: 3;
        }

        #resultsTable th:nth-child(1),
        #resultsTable td:nth-child(1) {
            position: sticky;
            left: 0;
            min-width: var(--symbol-col-width);
            width: var(--symbol-col-width);
            max-width: var(--symbol-col-width);
            z-index: 2;
        }

        #resultsTable th:nth-child(2),
        #resultsTable td:nth-child(2) {
            position: sticky;
            left: var(--symbol-col-width);
            min-width: var(--name-col-width);
            width: var(--name-col-width);
            z-index: 2;
            box-shadow: 1px 0 0 var(--line-soft);
        }

        #resultsTable tbody tr:nth-child(odd) td:nth-child(1),
        #resultsTable tbody tr:nth-child(odd) td:nth-child(2) {
            background: #ffffff;
        }

        #resultsTable tbody tr:nth-child(even) td:nth-child(1),
        #resultsTable tbody tr:nth-child(even) td:nth-child(2) {
            background: var(--bg-muted);
        }

        #resultsTable thead th:nth-child(1),
        #resultsTable thead th:nth-child(2) {
            z-index: 5;
        }

        #resultsTable tbody tr:hover td:nth-child(1),
        #resultsTable tbody tr:hover td:nth-child(2) {
            background: #eaf2ff;
        }

        .dataTables_wrapper .dataTables_info {
            padding-top: 0.7rem;
        }

        .dataTables_wrapper .dataTables_paginate {
            padding-top: 0.45rem;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button {
            border-radius: 8px !important;
            border: 1px solid transparent !important;
            font-weight: 700;
            color: #38527a !important;
            min-width: 2rem;
            padding: 0.25rem 0.45rem !important;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
            background: #edf3ff !important;
            border-color: #d5e2f9 !important;
            color: #1f3f7a !important;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: var(--accent) !important;
            color: white !important;
            border: 1px solid var(--accent) !important;
        }

        @media (max-width: 768px) {
            #tableToolbar {
                flex-direction: column;
                align-items: stretch;
            }

            #tableToolbar .dataTables_filter {
                margin-left: 0;
                text-align: left;
            }

            .dataTables_wrapper .dataTables_filter input {
                width: 100%;
                margin-left: 0;
                margin-top: 0.35rem;
            }
        }
    </style>
</head>
<body class="p-2 md:p-4">
    <div class="max-w-[98rem] mx-auto">
        <header class="mb-3">
            <h1 class="text-lg font-semibold text-gray-900 tracking-tight">Options Wheel Candidate Dashboard</h1>
            <p id="last-updated" class="text-gray-500 text-sm mt-1">Loading data...</p>
        </header>
        
        <!-- Summary Cards -->
        <div id="summary" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
            <div class="bg-white p-2 rounded-xl shadow-sm border border-gray-100 animate-pulse h-14"></div>
            <div class="bg-white p-2 rounded-xl shadow-sm border border-gray-100 animate-pulse h-14"></div>
            <div class="bg-white p-2 rounded-xl shadow-sm border border-gray-100 animate-pulse h-14"></div>
            <div class="bg-white p-2 rounded-xl shadow-sm border border-gray-100 animate-pulse h-14"></div>
        </div>

        <!-- Main Table -->
        <div class="dashboard-shell">
            <div class="mb-4 flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                <div id="thresholdLegend" class="text-xs text-gray-600 flex flex-wrap gap-x-4 gap-y-1">
                    <span class="font-semibold text-gray-700">Legend:</span>
                    <span><span class="text-emerald-700">Green</span> = meets target</span>
                    <span><span class="text-amber-700">Amber</span> = near target</span>
                    <span><span class="text-red-700">Red</span> = below target</span>
                </div>
                <div class="flex flex-wrap items-center gap-2 text-xs">
                    <label class="inline-flex items-center gap-2 rounded-md border border-gray-200 bg-gray-50 px-3 py-2 text-gray-700">
                        <input id="filterPassOnly" type="checkbox" class="h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                        PASS only
                    </label>
                    <label class="inline-flex items-center gap-2 rounded-md border border-gray-200 bg-gray-50 px-3 py-2 text-gray-700">
                        Min Score
                        <input id="filterMinScore" type="number" min="0" max="100" step="1" class="w-20 rounded border border-gray-300 px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </label>
                    <label class="inline-flex items-center gap-2 rounded-md border border-gray-200 bg-gray-50 px-3 py-2 text-gray-700">
                        Min OI
                        <input id="filterMinOi" type="number" min="0" step="1" class="w-24 rounded border border-gray-300 px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </label>
                    <button id="resetFilters" type="button" class="rounded-md border border-gray-300 bg-white px-3 py-2 text-gray-700 hover:bg-gray-50">
                        Reset filters
                    </button>
                    <span id="activeFilterCount" class="text-gray-500 px-2">No filters</span>
                </div>
            </div>
            <div id="tableToolbar"></div>
            <div class="overflow-x-auto max-h-[70vh] overflow-y-auto">
            <table id="resultsTable" class="display w-full text-sm">
                <thead>
                    <tr class="text-left bg-gray-50">
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Ticker symbol for the stock.">Symbol</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Company name.">Name</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Whether the candidate passed all screening criteria.">Status</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help text-right" title="Current underlying stock price.">Price</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help text-right" title="Put option strike price evaluated for the wheel.">Strike</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Option expiration date.">Exp</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help" title="Next known earnings date for the underlying.">Next Earn</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help text-center" title="Whether earnings occurs on/before option expiration.">Earn<=Exp</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help text-right" title="Days to expiration.">DTE</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help text-right" title="Estimated premium collected per share.">Premium</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help text-right" title="Estimated monthly yield percentage from premium.">Mo Yield%</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help text-right" title="Out-of-the-money percentage from current price to strike.">OTM%</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help text-right" title="Option delta, indicating probability-like sensitivity to price moves.">Delta</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help text-right" title="Bid-ask spread as a percentage of option price (lower is better).">Spread%</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help text-right" title="Open interest (number of open option contracts).">OI</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help text-right" title="IV Rank: how current implied volatility compares to historical range (0-1). Higher = IV is elevated = better for selling.">IVRank</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help text-right" title="RSI(14): Relative Strength Index. Below 30 = oversold, above 70 = overbought.">RSI</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help text-right" title="ADX(14): Average Directional Index. Above 25 = strong trend.">ADX</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help text-right" title="Price distance from EMA50 in percent. Negative = below EMA50.">Diff%</th>
                        <th class="px-4 py-3 font-semibold text-gray-700 cursor-help text-right" title="Composite ranking score: yield + OTM distance + liquidity (OI/volume) + spread quality + DTE fit + IV. Higher is better.">Score</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-200">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
            </div>
        </div>

    </div>

    <script>
        $(document).ready(function() {
            Promise.all([
                fetch('analysis_results.json'),
                fetch('screening_config.json')
            ])
                .then(([resultsResponse, configResponse]) => {
                    if (!resultsResponse.ok) throw new Error('Could not load analysis_results.json');
                    if (!configResponse.ok) throw new Error('Could not load screening_config.json');
                    return Promise.all([resultsResponse.json(), configResponse.json()]);
                })
                .then(([data, config]) => {
                    const escapeHtml = value => String(value).replace(/[&<>'"]/g, char => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[char]));

                    const formatMoney = value => value != null ? Number(value).toFixed(2) : 'N/A';
                    const formatPct = (value, digits = 2) => value != null ? `${Number(value).toFixed(digits)}%` : 'N/A';

                    const targetMonthlyYield = Number(config.TARGET_MONTHLY_YIELD_PCT ?? 1.0);
                    const minAbsDelta = Number(config.MIN_ABS_DELTA ?? 0.0);
                    const maxAbsDelta = Number(config.MAX_ABS_DELTA ?? 0.3);
                    const minDte = Number(config.MIN_DTE ?? 7);
                    const maxDte = Number(config.MAX_DTE ?? 60);
                    const minOtmPct = Number(config.MIN_OTM_PCT ?? 0.0);
                    const maxSpreadPct = Number(config.MAX_SPREAD_PCT ?? 20.0);
                    const scoreHighThreshold = 75;
                    const scoreMidThreshold = 55;

                    // Update Last Updated
                    const date = new Date(data.timestamp);
                    document.getElementById('last-updated').innerText = Number.isNaN(date.getTime())
                        ? 'Last analyzed: timestamp unavailable'
                        : `Last analyzed: ${date.toLocaleString()}`;

                    // Update legend with active thresholds
                    document.getElementById('thresholdLegend').innerHTML = `
                        <span class="font-semibold text-gray-700">Legend:</span>
                        <span><span class="text-emerald-700">Green</span> = meets target</span>
                        <span><span class="text-amber-700">Amber</span> = near target</span>
                        <span><span class="text-red-700">Red</span> = below target</span>
                        <span class="text-gray-500">Yield target: ${targetMonthlyYield.toFixed(2)}%</span>
                        <span class="text-gray-500">Max spread: ${maxSpreadPct.toFixed(2)}%</span>
                    `;

                    // Update Summary
                    const summaryDiv = document.getElementById('summary');
                    const cards = [
                        { label: 'Analyzed', value: data.total_tickers_analyzed, color: 'blue' },
                        { label: 'Phase 1 Passed', value: data.candidates_after_phase1, color: 'indigo' },
                        { label: 'Passed All', value: data.passed_all_criteria, color: 'green' },
                        { label: 'Near Misses', value: data.near_misses, color: 'amber' }
                    ];
                    const cardColorClass = {
                        blue: 'text-blue-500',
                        indigo: 'text-indigo-500',
                        green: 'text-green-500',
                        amber: 'text-amber-500'
                    };
                    
                    summaryDiv.innerHTML = cards.map(card => `
                        <div class="bg-white p-2.5 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                            <p class="text-xs font-bold uppercase tracking-wider ${cardColorClass[card.color] || 'text-gray-400'}">${card.label}</p>
                            <p class="text-xl font-black text-gray-800 mt-0.5">${card.value.toLocaleString()}</p>
                        </div>
                    `).join('');

                    // Populate Table
                    const tableBody = document.getElementById('tableBody');
                    tableBody.innerHTML = data.results.map(r => {
                        const symbolRaw = r.Symbol != null ? String(r.Symbol) : '';
                        const symbolText = escapeHtml(symbolRaw || 'N/A');
                        const symbolHref = `https://finance.yahoo.com/quote/${encodeURIComponent(symbolRaw)}/`;
                        const nameText = escapeHtml(r.Name != null ? String(r.Name) : 'N/A');
                        const expirationText = escapeHtml(r.Expiration != null ? String(r.Expiration) : 'N/A');
                        const nextEarningsText = escapeHtml(r.NextEarnings != null ? String(r.NextEarnings) : 'N/A');

                        const monthlyYield = r.MonthlyYieldPct;
                        const spreadPct = r.SpreadPct;
                        const score = r.Score;
                        const absDelta = r.Delta != null ? Math.abs(r.Delta) : null;
                        const dte = r.DTE != null ? Number(r.DTE) : null;
                        const earningsBeforeExpiry = r.EarningsBeforeExpiry === true;

                        const yieldClass = monthlyYield == null
                            ? 'text-gray-500'
                            : monthlyYield >= targetMonthlyYield
                                ? 'text-emerald-600'
                                : monthlyYield >= (targetMonthlyYield * 0.8)
                                    ? 'text-amber-600'
                                    : 'text-red-600';

                        const spreadClass = spreadPct == null
                            ? 'text-gray-500'
                            : spreadPct <= maxSpreadPct
                                ? 'text-emerald-600'
                                : spreadPct <= (maxSpreadPct * 1.25)
                                    ? 'text-amber-600'
                                    : 'text-red-600';

                        const otmClass = r.OTMPct == null
                            ? 'text-gray-500'
                            : r.OTMPct >= minOtmPct
                                ? 'text-emerald-600'
                                : r.OTMPct >= (minOtmPct * 0.8)
                                    ? 'text-amber-600'
                                    : 'text-red-600';

                        const deltaClass = absDelta == null
                            ? 'text-gray-500'
                            : (absDelta >= minAbsDelta && absDelta <= maxAbsDelta)
                                ? 'text-emerald-600'
                                : (absDelta >= (minAbsDelta * 0.8) && absDelta <= (maxAbsDelta * 1.2))
                                    ? 'text-amber-600'
                                    : 'text-red-600';

                        const scoreClass = score == null
                            ? 'text-gray-500'
                            : score >= scoreHighThreshold
                                ? 'text-emerald-700'
                                : score >= scoreMidThreshold
                                    ? 'text-amber-700'
                                    : 'text-red-700';

                        const dteClass = dte == null || Number.isNaN(dte)
                            ? 'text-gray-500'
                            : (dte >= minDte && dte <= maxDte)
                                ? 'text-emerald-600'
                                : (dte >= (minDte * 0.8) && dte <= (maxDte * 1.2))
                                    ? 'text-amber-600'
                                    : 'text-red-600';

                        const yieldCue = monthlyYield == null
                            ? 'N/A'
                            : monthlyYield >= targetMonthlyYield
                                ? 'OK'
                                : monthlyYield >= (targetMonthlyYield * 0.8)
                                    ? 'Near'
                                    : 'Low';

                        const isPass = String(r.Status || '').toUpperCase() === 'PASS';
                        const statusIcon = isPass ? '✓' : '!';
                        const statusLabel = isPass ? 'PASS' : 'REVIEW';
                        const earningsBadgeClass = r.EarningsBeforeExpiry == null
                            ? 'bg-gray-100 text-gray-700'
                            : earningsBeforeExpiry
                                ? 'bg-red-100 text-red-800'
                                : 'bg-emerald-100 text-emerald-800';
                        const earningsBadgeText = r.EarningsBeforeExpiry == null
                            ? 'N/A'
                            : earningsBeforeExpiry
                                ? 'Yes'
                                : 'No';

                        return `
                            <tr>
                                <td class="px-4 py-4 font-bold text-blue-600"><a href="${symbolHref}" target="_blank" rel="noopener noreferrer" class="hover:underline">${symbolText}</a></td>
                                <td class="px-4 py-4 text-gray-600 max-w-xs truncate" title="${nameText}">${nameText}</td>
                                <td class="px-4 py-4" data-order="${isPass ? 0 : 1}">
                                    <span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium ${isPass ? 'bg-green-100 text-green-800' : 'bg-amber-100 text-amber-800'}">
                                        <span aria-hidden="true">${statusIcon}</span>${statusLabel}
                                    </span>
                                </td>
                                <td class="px-4 py-4 font-mono text-gray-700 font-medium text-right">${formatMoney(r.Price)}</td>
                                <td class="px-4 py-4 font-mono text-gray-700 text-right">${formatMoney(r.Strike)}</td>
                                <td class="px-4 py-4 text-gray-600">${expirationText}</td>
                                <td class="px-4 py-4 text-gray-600">${nextEarningsText}</td>
                                <td class="px-4 py-4 text-center" data-order="${earningsBeforeExpiry ? 1 : 0}">
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${earningsBadgeClass}">${earningsBadgeText}</span>
                                </td>
                                <td class="px-4 py-4 ${dteClass} text-right">${r.DTE != null ? r.DTE : 'N/A'}</td>
                                <td class="px-4 py-4 font-mono text-gray-700 text-right">${formatMoney(r.Premium)}</td>
                                <td class="px-4 py-4 font-mono font-bold ${yieldClass} text-right">
                                    ${formatPct(r.MonthlyYieldPct)}
                                    <span class="ml-1 text-xs text-gray-500">${yieldCue}</span>
                                </td>
                                <td class="px-4 py-4 font-mono ${otmClass} text-right">${formatPct(r.OTMPct)}</td>
                                <td class="px-4 py-4 font-mono ${deltaClass} text-right">${r.Delta != null ? r.Delta.toFixed(3) : 'N/A'}</td>
                                <td class="px-4 py-4 font-mono ${spreadClass} text-right">${formatPct(r.SpreadPct)}</td>
                                <td class="px-4 py-4 text-gray-600 text-right">${r.OpenInterest != null ? r.OpenInterest : 'N/A'}</td>
                                <td class="px-4 py-4 font-mono text-right ${r.IVRank != null && r.IVRank >= 0.5 ? 'text-emerald-600' : r.IVRank != null && r.IVRank >= 0.3 ? 'text-amber-600' : r.IVRank != null ? 'text-red-600' : 'text-gray-500'}">${r.IVRank != null ? r.IVRank.toFixed(2) : 'N/A'}</td>
                                <td class="px-4 py-4 font-mono text-right ${r.RSI != null && r.RSI < 35 ? 'text-red-600' : r.RSI != null && r.RSI > 65 ? 'text-amber-600' : 'text-gray-600'}">${r.RSI != null ? r.RSI.toFixed(1) : 'N/A'}</td>
                                <td class="px-4 py-4 font-mono text-right ${r.ADX != null && r.ADX > 25 ? 'text-amber-600 font-semibold' : 'text-gray-600'}">${r.ADX != null ? r.ADX.toFixed(1) : 'N/A'}</td>
                                <td class="px-4 py-4 font-mono text-right ${r.DiffPct != null && r.DiffPct < -5 ? 'text-red-600' : r.DiffPct != null && r.DiffPct > 5 ? 'text-emerald-600' : 'text-gray-600'}">${r.DiffPct != null ? r.DiffPct.toFixed(1) + '%' : 'N/A'}</td>
                                <td class="px-4 py-4 font-mono font-semibold ${scoreClass} text-right">${r.Score != null ? r.Score.toFixed(2) : 'N/A'}</td>
                            </tr>
                        `;
                    }).join('');

                    // Initialize DataTable
                    const table = $('#resultsTable').DataTable({
                        lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, 'All']],
                        pageLength: -1,
                        order: [[2, 'asc'], [19, 'desc'], [10, 'desc']],
                        responsive: true,
                        language: {
                            searchPlaceholder: "Search tickers...",
                            search: ""
                        }
                    });
                    
                    const tableToolbar = document.getElementById('tableToolbar');
                    const dataTableWrapper = document.getElementById('resultsTable_wrapper');
                    const dataTableLength = dataTableWrapper.querySelector('.dataTables_length');
                    const dataTableFilter = dataTableWrapper.querySelector('.dataTables_filter');

                    tableToolbar.appendChild(dataTableLength);
                    tableToolbar.appendChild(dataTableFilter);

                    // Quick filters
                    const passOnlyInput = document.getElementById('filterPassOnly');
                    const minScoreInput = document.getElementById('filterMinScore');
                    const minOiInput = document.getElementById('filterMinOi');
                    const resetFiltersBtn = document.getElementById('resetFilters');
                    const activeFilterCount = document.getElementById('activeFilterCount');

                    const updateActiveFilterCount = () => {
                        const active = [
                            passOnlyInput.checked,
                            minScoreInput.value !== '',
                            minOiInput.value !== ''
                        ].filter(Boolean).length;

                        activeFilterCount.innerText = active === 0 ? 'No filters' : `${active} active filter${active > 1 ? 's' : ''}`;
                    };

                    const debounce = (fn, wait = 200) => {
                        let timeoutId;
                        return (...args) => {
                            clearTimeout(timeoutId);
                            timeoutId = setTimeout(() => fn(...args), wait);
                        };
                    };

                    const redrawTable = () => {
                        updateActiveFilterCount();
                        table.draw();
                    };

                    const debouncedRedraw = debounce(redrawTable, 180);

                    $.fn.dataTable.ext.search.push(function(settings, rowData) {
                        if (settings.nTable.id !== 'resultsTable') {
                            return true;
                        }

                        const passOnly = passOnlyInput.checked;
                        const minScore = minScoreInput.value === '' ? null : Number(minScoreInput.value);
                        const minOi = minOiInput.value === '' ? null : Number(minOiInput.value);

                        const statusText = (rowData[2] || '').toUpperCase();
                        const scoreText = (rowData[19] || '').replace('%', '').trim();
                        const oiText = (rowData[14] || '').replace(/,/g, '').trim();

                        const scoreValue = scoreText === 'N/A' ? null : Number(scoreText);
                        const oiValue = oiText === 'N/A' ? null : Number(oiText);

                        if (passOnly && !statusText.includes('PASS')) {
                            return false;
                        }
                        if (minScore != null && (scoreValue == null || Number.isNaN(scoreValue) || scoreValue < minScore)) {
                            return false;
                        }
                        if (minOi != null && (oiValue == null || Number.isNaN(oiValue) || oiValue < minOi)) {
                            return false;
                        }

                        return true;
                    });

                    passOnlyInput.addEventListener('change', redrawTable);
                    minScoreInput.addEventListener('input', debouncedRedraw);
                    minOiInput.addEventListener('input', debouncedRedraw);
                    minScoreInput.addEventListener('change', redrawTable);
                    minOiInput.addEventListener('change', redrawTable);

                    resetFiltersBtn.addEventListener('click', () => {
                        passOnlyInput.checked = false;
                        minScoreInput.value = '';
                        minOiInput.value = '';
                        redrawTable();
                    });

                    updateActiveFilterCount();

                })
                .catch(error => {
                    console.error('Error loading JSON:', error);
                    document.getElementById('summary').innerHTML = `
                        <div class="col-span-full bg-red-50 p-4 border border-red-200 rounded-lg text-red-700">
                            <strong>Error:</strong> Could not load dashboard data.
                            <p class="text-sm mt-1">Please ensure <code>analysis_results.json</code> and <code>screening_config.json</code> exist and you are viewing this page through a web server (e.g., <code>python -m http.server</code>).</p>
                        </div>
                    `;
                });
        });
    </script>
</body>
</html>
